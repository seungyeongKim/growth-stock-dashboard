<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>성장주 대시보드</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #667085;
      --line: #d9dee7;
      --blue: #2457c5;
      --green: #18815c;
      --amber: #a96300;
      --red: #b42318;
      --soft-blue: #eef4ff;
      --soft-green: #edf8f3;
      --soft-amber: #fff6e7;
      --shadow: 0 14px 40px rgba(21, 32, 43, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      letter-spacing: 0;
    }

    button, input, select {
      font: inherit;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      background: #111827;
      color: white;
      padding: 24px clamp(18px, 3vw, 40px);
    }

    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      max-width: 1480px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1.18;
      font-weight: 760;
    }

    .subtitle {
      margin: 0;
      color: #cbd5e1;
      max-width: 860px;
      line-height: 1.6;
      font-size: 15px;
    }

    .date-pill {
      min-width: 160px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #e5e7eb;
      padding: 10px 12px;
      border-radius: 8px;
      text-align: right;
      font-size: 13px;
      line-height: 1.45;
    }

    .date-pill span {
      display: block;
      margin-top: 4px;
      color: #cbd5e1;
      font-size: 12px;
    }

    main {
      max-width: 1480px;
      width: 100%;
      margin: 0 auto;
      padding: 22px clamp(18px, 3vw, 40px) 36px;
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
      min-height: 560px;
    }

    main.list-collapsed {
      grid-template-columns: 42px minmax(0, 1fr);
    }

    main.detail-collapsed {
      grid-template-columns: minmax(0, 1fr) 42px;
    }

    .toolbar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      align-items: stretch;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    main.detail-collapsed .toolbar {
      grid-template-columns: minmax(220px, 1fr) 220px auto;
      align-items: center;
    }

    main.detail-collapsed .filter-group {
      display: flex;
      justify-content: flex-end;
      flex-wrap: nowrap;
    }

    main.detail-collapsed .filter-btn {
      white-space: nowrap;
      padding: 10px 12px;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      background: white;
      min-width: 0;
    }

    .filter-group {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .filter-btn {
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
      border-radius: 8px;
      padding: 10px 8px;
      cursor: pointer;
      white-space: normal;
      min-height: 42px;
      line-height: 1.25;
      text-align: center;
    }

    .filter-btn.active {
      border-color: var(--blue);
      background: var(--soft-blue);
      color: var(--blue);
      font-weight: 700;
    }

    .industry-select {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: white;
      min-height: 42px;
      width: 100%;
    }

    .table-panel, .detail-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .list-column {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .list-column.collapsed {
      display: block;
    }

    .list-column.collapsed .toolbar,
    .list-column.collapsed .table-panel {
      display: none;
    }

    .collapsed-rail {
      display: none;
      height: 100%;
      min-height: 220px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      align-items: center;
      justify-content: center;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }

    .list-column.collapsed .collapsed-rail,
    .detail-panel.collapsed .collapsed-rail {
      display: flex;
    }

    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcff;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 16px;
    }

    .title-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      border: 1px solid var(--line);
      background: white;
      color: #344054;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 17px;
      line-height: 1;
    }

    .icon-btn:hover {
      background: #f4f7ff;
      border-color: #b7c7ef;
      color: var(--blue);
    }

    .count {
      color: var(--muted);
      font-size: 13px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .table-panel table {
      font-size: 13px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 0;
      font-size: 14px;
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid #edf0f5;
      text-align: left;
      vertical-align: top;
    }

    .table-panel th,
    .table-panel td {
      padding: 10px 8px;
    }

    th {
      color: #475467;
      font-size: 12px;
      background: #fbfcff;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody tr {
      cursor: pointer;
      transition: background 140ms ease;
    }

    tbody tr:hover, tbody tr.selected {
      background: #f4f7ff;
    }

    .company-name {
      font-weight: 760;
      color: var(--ink);
      margin-bottom: 3px;
    }

    .code {
      color: var(--muted);
      font-size: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .table-panel .badge {
      margin: 0 0 4px;
    }

    .badge.growth { color: var(--blue); background: var(--soft-blue); border-color: #c7d7fe; }
    .badge.margin { color: var(--green); background: var(--soft-green); border-color: #bcebd8; }
    .badge.watch { color: var(--amber); background: var(--soft-amber); border-color: #f8d89a; }

    .num {
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      font-weight: 700;
    }

    .soft {
      color: var(--muted);
      line-height: 1.45;
    }

    .detail-panel {
      position: sticky;
      top: 14px;
      min-width: 0;
    }

    .detail-panel.collapsed {
      display: block;
      cursor: pointer;
    }

    .detail-panel.collapsed .panel-title,
    .detail-panel.collapsed .detail-body {
      display: none;
    }

    .detail-body {
      padding: 16px;
      min-height: 0;
    }

    .wide-only {
      display: none;
    }

    main.detail-collapsed .wide-only {
      display: table-cell;
    }

    main.detail-collapsed table {
      min-width: 960px;
    }

    main.detail-collapsed .table-panel table {
      font-size: 14px;
    }

    .detail-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .detail-head h2 {
      margin: 0 0 4px;
      font-size: 22px;
    }

    .rank {
      color: var(--muted);
      font-size: 13px;
    }

    .score {
      min-width: 104px;
      text-align: center;
      border-radius: 8px;
      background: #111827;
      color: white;
      padding: 10px;
    }

    .score strong {
      display: block;
      font-size: 24px;
      line-height: 1;
    }

    .score span {
      font-size: 12px;
      color: #cbd5e1;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 14px 0;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcff;
    }

    .stat label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .stat strong {
      display: block;
      font-size: 17px;
    }

    .history-table {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      font-size: 13px;
    }

    .history-table table {
      min-width: 0;
      font-size: 13px;
    }

    .history-table th,
    .history-table td {
      padding: 9px 8px;
      text-align: right;
    }

    .history-table th:first-child,
    .history-table td:first-child {
      text-align: left;
      font-weight: 700;
    }

    .data-caption {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 8px;
    }

    .status-tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--amber);
      background: var(--soft-amber);
      border: 1px solid #f8d89a;
      white-space: nowrap;
    }

    .section {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .section h3 {
      margin: 0 0 8px;
      font-size: 14px;
    }

    .section p, .section li {
      color: #344054;
      line-height: 1.58;
      font-size: 14px;
    }

    .section ul {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    .research-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .research-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcff;
    }

    .research-box h4 {
      margin: 0 0 8px;
      font-size: 13px;
      color: #344054;
    }

    .research-box ul {
      margin: 0;
    }

    .link-list {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .link-list a {
      color: var(--blue);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: #fbfcff;
      line-height: 1.4;
      font-size: 13px;
    }

    .link-list a:hover {
      text-decoration: underline;
    }

    .empty {
      padding: 36px 16px;
      color: var(--muted);
      text-align: center;
    }

    .note {
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      background: #fff7ed;
      color: #7c2d12;
      border: 1px solid #fed7aa;
      font-size: 13px;
      line-height: 1.55;
    }

    @media (max-width: 1180px) {
      main {
        grid-template-columns: 1fr;
      }

      .detail-panel {
        position: static;
      }

      table {
        min-width: 520px;
      }
    }

    @media (max-width: 820px) {
      .header-row {
        flex-direction: column;
      }

      .date-pill {
        text-align: left;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      main.detail-collapsed .toolbar {
        grid-template-columns: 1fr;
      }

      main.detail-collapsed .filter-group {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        justify-content: stretch;
      }

      .filter-group {
        justify-content: flex-start;
      }
    }

    @media (max-width: 520px) {
      .stat-grid {
        grid-template-columns: 1fr;
      }

      .research-grid {
        grid-template-columns: 1fr;
      }

      header {
        padding-top: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <div class="header-row">
        <div>
          <h1>성장주 대시보드</h1>
          <p class="subtitle">매출 증가율, 영업이익률, 순이익률을 1차 기준으로 걸러낸 후보군입니다. 회사별 성장 논리, 확인해야 할 리스크, 공시와 리포트 링크를 함께 모아 동료와 같은 화면에서 검토할 수 있게 구성했습니다.</p>
        </div>
        <div class="date-pill">
          기준일<br />
          <strong>2026-06-04</strong>
          <span>업데이트 2026-06-23</span>
        </div>
      </div>
    </header>

    <main>
      <section class="list-column" id="listColumn">
        <button class="collapsed-rail" id="openListBtn" type="button" title="목록 펼치기">목록 펼치기</button>
        <div class="toolbar">
          <input class="search" id="searchInput" type="search" placeholder="회사명, 종목코드, 업종 검색" />
          <select class="industry-select" id="industrySelect" aria-label="업종 필터">
            <option value="all">전체 업종</option>
          </select>
          <div class="filter-group" aria-label="재무 조건 필터">
            <button class="filter-btn active" data-filter="all">전체</button>
            <button class="filter-btn" data-filter="growth">매출증가</button>
            <button class="filter-btn" data-filter="margin">이익률 높음</button>
            <button class="filter-btn" data-filter="combo">매출증가 + 이익률</button>
          </div>
        </div>

        <div class="table-panel">
          <div class="panel-title">
            <h2>후보 리스트</h2>
            <div class="title-actions">
              <span class="count" id="resultCount"></span>
              <button class="icon-btn" id="collapseListBtn" type="button" title="목록 접기" aria-label="목록 접기">‹</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>회사</th>
                  <th class="wide-only">산업</th>
                  <th>핵심수치</th>
                  <th class="wide-only">매출증가액</th>
                  <th class="wide-only">이익률</th>
                  <th>조건</th>
                  <th class="wide-only">핵심내용</th>
                </tr>
              </thead>
              <tbody id="companyRows"></tbody>
            </table>
          </div>
          <div class="empty" id="emptyState" hidden>조건에 맞는 회사가 없습니다.</div>
        </div>
      </section>

      <aside class="detail-panel" id="detailPanel" aria-live="polite">
        <button class="collapsed-rail" id="openDetailBtn" type="button" title="상세보기 펼치기">상세보기 펼치기</button>
        <div class="panel-title">
          <h2>회사 상세</h2>
          <div class="title-actions">
            <button class="icon-btn" id="collapseDetailBtn" type="button" title="상세보기 접기" aria-label="상세보기 접기">›</button>
          </div>
        </div>
        <div class="detail-body" id="detailBody"></div>
      </aside>
    </main>
  </div>

    function sortByReviewPriority(items) {
      return [...items].sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return a.rank - b.rank;
      });
    }

    const fmt = (value) => {
      if (value === null || value === undefined) return "-";
      return `${value.toFixed(value % 1 === 0 ? 0 : 1)}%`;
    };

    const fmtAmount = (value) => {
      if (value === null || value === undefined) return "-";
      return value.toLocaleString("ko-KR");
    };

    const isGrowth = (company) => company.revenueGrowth >= 15;
    const isMargin = (company) => company.opMargin >= 10 && company.netMargin >= 10;
    const isCombo = (company) => isGrowth(company) && isMargin(company);

    function tagsFor(company) {
      const tags = [];
      if (isGrowth(company)) tags.push(`<span class="badge growth">매출증가</span>`);
      if (isMargin(company)) tags.push(`<span class="badge margin">이익률 높음</span>`);
      if (!isCombo(company)) tags.push(`<span class="badge watch">추가확인</span>`);
      return tags.join(" ");
    }

    function passFilter(company) {
      if (state.filter === "growth" && !isGrowth(company)) return false;
      if (state.filter === "margin" && !isMargin(company)) return false;
      if (state.filter === "combo" && !isCombo(company)) return false;
      if (state.industry !== "all" && company.industry !== state.industry) return false;
      if (state.search) {
        const detail = researchDetails[company.code];
        const researchText = detail ? [
          ...detail.business,
          ...detail.growthDrivers,
          ...detail.evidence,
          ...detail.checks,
          detail.sourceNote
        ].join(" ") : "";
        const checked = checkResults[company.code];
        const checkedText = checked ? `${checked.updatedAt} ${checked.items.join(" ")} ${checked.conclusion}` : "";
        const quickCheckedText = (quickCheckUpdates[company.code] || []).join(" ");
        const remainingResearch = remainingCheckResearch[company.code];
        const remainingResearchText = remainingResearch ? `${remainingResearch.checked.join(" ")} ${remainingResearch.still.join(" ")}` : "";
        const growth = growthAdditions[company.code];
        const growthText = growth ? `${growth.outlook.join(" ")} ${growth.leading.join(" ")} ${growth.sourceNote}` : "";
        const meta = watchlistMeta[company.code];
        const metaText = meta ? `${meta.confidence} ${meta.sourceType} ${meta.nextCheck} ${meta.catalysts.join(" ")} ${meta.conviction}` : "";
        const deep = evidenceDeepDive[company.code];
        const deepText = deep ? `${deep.title} ${deep.points.join(" ")} ${deep.sourceLevel}` : "";
        const companyDeep = companyDeepReviews[company.code];
        const companyDeepText = companyDeep ? `${companyDeep.title} ${companyDeep.verdict} ${companyDeep.metrics.flat().join(" ")} ${companyDeep.earningPower.join(" ")} ${companyDeep.marginDurability.join(" ")} ${companyDeep.breakPoints.join(" ")} ${companyDeep.nextChecks.join(" ")}` : "";
        const valuation = valuationEssentials[company.code];
        const valuationText = valuation ? `${valuation.profitMetric} ${valuation.multipleMetric} ${valuation.required.join(" ")} ${valuation.method} ${valuation.cheapRule} ${valuation.status}` : "";
        const futureAssumption = futureValueAssumptions[company.code];
        const futureAssumptionText = futureAssumption ? `${futureAssumption.metric} ${futureAssumption.fairMultiple} ${futureAssumption.basis} ${futureAssumption.caution} 미래가치 현재 가격 기대수익률 적정 PER` : "";
        const reliability = estimateReliability[company.code];
        const reliabilityText = reliability ? `${reliability.level} ${reliability.backlog} ${reliability.capacity} ${reliability.recurring} ${reliability.diversification} ${reliability.revision}` : "";
        const competitive = competitivePosition[company.code];
        const competitiveText = competitive ? `${competitive.peers.join(" ")} ${competitive.edge.join(" ")} ${competitive.pricing} ${competitive.lockIn} ${competitive.barrier} ${competitive.verdict}` : "";
        const indicatorsText = (industryIndicators[company.industry] || []).join(" ");
        const growthEvidenceText = `${growthEvidenceSources.common.sources.map((source) => `${source.name} ${source.use} ${source.signal}`).join(" ")} ${(growthEvidenceSources.byIndustry[company.industry] || []).join(" ")}`;
        const growthLensText = `${growthLensFramework.title} ${growthLensFramework.visibleGrowth.title} ${growthLensFramework.hiddenGrowth.title} ${growthLensFramework.recommendation} ${growthLensFramework.addedChecks.join(" ")}`;
        const remainingText = (remainingChecks[company.code] || []).join(" ");
        const haystack = `${company.name} ${company.code} ${company.industry} ${company.thesis} ${company.facts} ${researchText} ${growthText} ${metaText} ${deepText} ${companyDeepText} ${valuationText} ${futureAssumptionText} ${reliabilityText} ${competitiveText} ${indicatorsText} ${growthEvidenceText} ${growthLensText} ${checkedText} ${quickCheckedText} ${remainingResearchText} ${remainingText}`.toLowerCase();
        if (!haystack.includes(state.search.toLowerCase())) return false;
      }
      return true;

        option.textContent = industry;

          <td class="num wide-only">${fmtAmount(revenueIncreaseAmount(company))}억원</td>
          <td class="wide-only">
            <div class="num">영업 ${fmt(company.opMargin)}</div>
            <div class="code">순익 ${fmt(company.netMargin)}</div>
          </td>
          <td>${tagsFor(company)}</td>
          <td class="soft wide-only">${company.thesis}</td>

      `).join("");

      if (!filtered.some((company) => company.code === state.selectedCode) && filtered[0]) {
        state.selectedCode = filtered[0].code;
      }
      renderDetail();
    }

    function revenueIncreaseAmount(company) {
      const history = financialHistory[company.code] || [];
      const current = history.find((item) => item.year === 2025);
      const previous = history.find((item) => item.year === 2024);
      if (!current || !previous) return null;
      return current.revenue - previous.revenue;
    }

    function topicName(name) {
      const last = name.charCodeAt(name.length - 1);
      const hasFinalConsonant = last >= 0xac00 && last <= 0xd7a3 && ((last - 0xac00) % 28) !== 0;
      return `${name}${hasFinalConsonant ? "은" : "는"}`;
    }

    function renderHistoryTable(company) {
      const history = financialHistory[company.code] || [];
      if (!history.length) {
        return `<p class="soft">최근 3년 재무 데이터가 아직 입력되지 않았습니다.</p>`;
      }

      return `

        <div class="data-caption">단위: 억원. 2025년 값은 잠정 실적, 리서치 추정, 공개 보도자료 기준이 섞여 있어 최종 사업보고서 기준으로 재확인이 필요합니다.</div>
      `;
    }

    function renderCompanyGrowthLens(company) {
      const indicators = industryIndicators[company.industry] || [];
      const valuation = valuationData[company.code] || {};
      const deepReview = companyDeepReviews[company.code];
      const revenueIncrease = revenueIncreaseAmount(company);
      const visibleSignals = [
        `매출 성장률 ${fmt(company.revenueGrowth)}`,
        revenueIncrease !== null ? `2025년 매출 증가액 ${fmtAmount(revenueIncrease)}억원` : "매출 증가액 추가 확인",
        `영업이익률 ${fmt(company.opMargin)}`,
        `순이익률 ${fmt(company.netMargin)}`,
        valuation.per2027E ? `2027E PER ${valuation.per2027E}배` : "Forward PER 추가 확인"
      ];
      const hiddenSignals = deepReview
        ? deepReview.nextChecks.slice(0, 4)
        : indicators.slice(0, 4).map((item) => `${item} 추적`);
      const visibleScore = (company.revenueGrowth >= 30 ? 2 : 1)
        + (company.opMargin >= 20 ? 2 : 1)
        + (company.netMargin >= 15 ? 1 : 0);
      const hiddenScore = indicators.length >= 4 ? 3 : 2;
      const lensType = visibleScore >= 4 && hiddenScore >= 3
        ? "재무 성장 + 선행지표 혼합형"
        : visibleScore >= 4
          ? "재무로 보이는 성장 중심"
          : "선행지표 확인이 더 중요한 후보";
      const companyTopic = topicName(company.name);
      const companyConclusion = deepReview
        ? `${companyTopic} 이미 재무 성장이 확인됐고, 다음 판단은 ${hiddenSignals[0]} 여부가 핵심입니다.`
        : `${companyTopic} 재무 수치로 1차 후보에 들어왔고, 다음 판단은 ${indicators.slice(0, 2).join(", ")} 같은 업종 선행지표가 실제 숫자로 이어지는지입니다.`;

      return `
        <div class="research-grid">
          <div class="research-box">
            <h4>이 종목의 렌즈: ${lensType}</h4>
            <p>${companyTopic} 공통 설명보다 아래 신호를 중심으로 봅니다.</p>
            <ul>
              <li>재무 확인 강도: ${visibleScore >= 4 ? "높음" : "중간"}</li>
              <li>선행지표 필요도: ${hiddenScore >= 3 ? "높음" : "중간"}</li>
            </ul>
          </div>
          <div class="research-box">
            <h4>재무로 보이는 신호</h4>

          </div>
          <div class="research-box">
            <h4>재무 전에 확인할 신호</h4>
            <ul>${hiddenSignals.map((item) => `<li>${item}</li>`).join("")}</ul>
          </div>
          <div class="research-box">
            <h4>분석 결론</h4>
            <p>${companyConclusion}</p>
          </div>
        </div>
        <div class="data-caption">렌즈 프레임 업데이트: ${growthLensFramework.updatedAt}</div>
      `;
    }

    function renderGrowthEvidenceData(company) {
      const data = valuationData[company.code] || {};
      const hasValue = (value) => value !== null && value !== undefined && value !== "";
      const asNumber = (value) => hasValue(value) ? Number(String(value).replace(/,/g, "")) : null;
      const valueWithUnit = (value, unit = "억원") => hasValue(value) ? `${value}${unit}` : "확인 필요";
      const ratio = (numerator, denominator) => {
        const num = asNumber(numerator);
        const den = asNumber(denominator);
        if (!num || !den) return "확인 필요";
        return `${((num / den) * 100).toFixed(1)}%`;
      };
      const cagr = (start, end) => {
        const startNumber = asNumber(start);
        const endNumber = asNumber(end);
        if (!startNumber || !endNumber || startNumber <= 0 || endNumber <= 0) return "확인 필요";
        return `${((Math.pow(endNumber / startNumber, 1 / 2) - 1) * 100).toFixed(1)}%`;
      };
      const diff = (start, end) => {
        const startNumber = asNumber(start);
        const endNumber = asNumber(end);
        if (startNumber === null || endNumber === null) return "확인 필요";
        return `${fmtAmount(Math.round(endNumber - startNumber))}억원`;
      };
      const assumption = futureValueAssumptions[company.code] || {};
      const fairMultiple = asNumber(assumption.fairMultiple);
      const marketCap = asNumber(data.marketCap);
      const net2027 = asNumber(data.net2027E);
      const requiredNetIncome = fairMultiple && marketCap ? marketCap / fairMultiple : null;
      const netIncomeBuffer = requiredNetIncome && net2027 ? `${(((net2027 / requiredNetIncome) - 1) * 100).toFixed(1)}%` : "확인 필요";
      const rows = [
        { metric: "현재 시가총액", value: valueWithUnit(data.marketCap), source: hasValue(data.marketCap) ? "FnGuide" : "확인 필요" },
        { metric: "2025 매출 / 영업이익 / 순이익", value: `${valueWithUnit(data.revenue2025)} / ${valueWithUnit(data.op2025)} / ${valueWithUnit(data.net2025)}`, source: hasValue(data.revenue2025) ? "FnGuide" : "확인 필요" },
        { metric: "2026E 매출 / 영업이익 / 순이익", value: `${valueWithUnit(data.revenue2026E)} / ${valueWithUnit(data.op2026E)} / ${valueWithUnit(data.net2026E)}`, source: hasValue(data.revenue2026E) ? "FnGuide 컨센서스" : "확인 필요" },
        { metric: "2027E 매출 / 영업이익 / 순이익", value: `${valueWithUnit(data.revenue2027E)} / ${valueWithUnit(data.op2027E)} / ${valueWithUnit(data.net2027E)}`, source: hasValue(data.revenue2027E) ? "FnGuide 컨센서스" : "확인 필요" },
        { metric: "2025→2027E 매출 증가액", value: diff(data.revenue2025, data.revenue2027E), source: hasValue(data.revenue2027E) ? "계산값" : "확인 필요" },
        { metric: "2025→2027E 영업이익 증가액", value: diff(data.op2025, data.op2027E), source: hasValue(data.op2027E) ? "계산값" : "확인 필요" },
        { metric: "2025→2027E 순이익 증가액", value: diff(data.net2025, data.net2027E), source: hasValue(data.net2027E) ? "계산값" : "확인 필요" },
        { metric: "2025~2027E 매출 CAGR", value: cagr(data.revenue2025, data.revenue2027E), source: hasValue(data.revenue2027E) ? "계산값" : "확인 필요" },
        { metric: "2025~2027E 영업이익 CAGR", value: cagr(data.op2025, data.op2027E), source: hasValue(data.op2027E) ? "계산값" : "확인 필요" },
        { metric: "2027E 영업이익률", value: ratio(data.op2027E, data.revenue2027E), source: hasValue(data.op2027E) ? "계산값" : "확인 필요" },
        { metric: "현재 시총이 요구하는 2027E 순이익", value: requiredNetIncome ? `${fmtAmount(Math.round(requiredNetIncome))}억원` : "확인 필요", source: fairMultiple ? `적정 PER ${fairMultiple}배 가정` : "확인 필요" },
        { metric: "컨센서스 순이익 여유", value: netIncomeBuffer, source: netIncomeBuffer !== "확인 필요" ? "계산값" : "확인 필요" },
        { metric: "2027E PER", value: hasValue(data.per2027E) ? `${data.per2027E}배` : "확인 필요", source: hasValue(data.per2027E) ? "계산값" : "확인 필요" }
      ];

      return `
        <div class="section">
          <h3>확보된 성장성 데이터</h3>
          <div class="history-table">
            <table>
              <thead>
                <tr>
                  <th>항목</th>
                  <th>데이터</th>
                  <th>근거</th>
                </tr>
              </thead>
              <tbody>
                ${rows.map((row) => `
                  <tr>
                    <td>${row.metric}</td>
                    <td>${row.value}</td>
                    <td><span class="status-tag">${row.source}</span></td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
          <div class="data-caption">데이터 기준: ${data.sourceDate || "확인 필요"}. 컨센서스가 없는 종목은 확인 필요로 남겨두었습니다.</div>
        </div>
      `;
    }

    function renderGrowthEvidenceSources(company) {
      const common = growthEvidenceSources.common.sources;
      const industryItems = growthEvidenceSources.byIndustry[company.industry] || [];
      const deepReview = companyDeepReviews[company.code];
      const priorityItems = deepReview
        ? deepReview.nextChecks.slice(0, 4)
        : industryItems.slice(0, 4);

      return `
        <div class="research-grid">
          <div class="research-box">

          <div class="research-box">

          </div>
          <div class="research-box">
            <h4>${company.name} 다음 확인 우선순위</h4>
            <ul>${priorityItems.map((item) => `<li>${item}</li>`).join("")}</ul>
          </div>
          <div class="research-box">
            <h4>판단에 쓰는 방식</h4>
            <ul>
              <li>DART는 실제 사업부·지역·수주가 성장하는지 확인합니다.</li>
              <li>K-stat은 기업 실적보다 먼저 수출 수요가 살아나는지 확인합니다.</li>
              <li>컨센서스 변화는 시장이 미래 이익을 계속 올려 잡는지 확인합니다.</li>
              <li>수주·CAPA는 재무에 찍히기 전 성장 가시성을 확인합니다.</li>
            </ul>
          </div>
        </div>
        ${renderGrowthEvidenceData(company)}
        <div class="data-caption">자료원 프레임 업데이트: ${growthEvidenceSources.common.updatedAt}</div>
      `;
    }

    function renderResearch(company) {
      const detail = researchDetails[company.code];
      if (!detail) {
        return `<p class="soft">상세 조사 메모가 아직 입력되지 않았습니다.</p>`;

        <div class="data-caption">조사 메모 기준: ${detail.sourceNote}</div>

    function renderCheckResults(company) {

          </div>

        </div>
        <div class="data-caption">추가 자료 기준: ${growth.sourceNote}</div>

    function renderBuyReadiness(company) {
      const data = valuationData[company.code] || {};
      const assumption = futureValueAssumptions[company.code] || {};
      const reliability = estimateReliability[company.code];
      const competitive = competitivePosition[company.code];
      const hasValue = (value) => value !== null && value !== undefined && value !== "";
      const asNumber = (value) => hasValue(value) ? Number(String(value).replace(/,/g, "")) : null;
      const cagrValue = (start, end) => {
        const startNumber = asNumber(start);
        const endNumber = asNumber(end);
        if (!startNumber || !endNumber || startNumber <= 0 || endNumber <= 0) return null;
        return (Math.pow(endNumber / startNumber, 1 / 2) - 1) * 100;
      };
      const ratioValue = (numerator, denominator) => {
        const num = asNumber(numerator);
        const den = asNumber(denominator);
        if (!num || !den) return null;
        return (num / den) * 100;
      };
      const formatPercent = (value) => value === null || Number.isNaN(value) ? "확인 필요" : `${value.toFixed(1)}%`;
      const formatAmount = (value) => value === null || Number.isNaN(value) ? "확인 필요" : `${fmtAmount(Math.round(value))}억원`;
      const fairMultiple = asNumber(assumption.fairMultiple);
      const marketCap = asNumber(data.marketCap);
      const futureNetIncome = asNumber(data.net2027E);
      const fairMarketCap = fairMultiple && futureNetIncome ? futureNetIncome * fairMultiple : null;
      const expectedReturn = fairMarketCap && marketCap ? ((fairMarketCap / marketCap) - 1) * 100 : null;
      const requiredNetIncome = fairMultiple && marketCap ? marketCap / fairMultiple : null;
      const netIncomeBuffer = requiredNetIncome && futureNetIncome ? ((futureNetIncome / requiredNetIncome) - 1) * 100 : null;
      const revenueIncrease = asNumber(data.revenue2027E) !== null && asNumber(data.revenue2025) !== null ? asNumber(data.revenue2027E) - asNumber(data.revenue2025) : null;
      const opIncrease = asNumber(data.op2027E) !== null && asNumber(data.op2025) !== null ? asNumber(data.op2027E) - asNumber(data.op2025) : null;
      const netIncrease = asNumber(data.net2027E) !== null && asNumber(data.net2025) !== null ? asNumber(data.net2027E) - asNumber(data.net2025) : null;
      const opMargin2025 = ratioValue(data.op2025, data.revenue2025);
      const revenueCagr = cagrValue(data.revenue2025, data.revenue2027E);
      const opCagr = cagrValue(data.op2025, data.op2027E);
      const netCagr = cagrValue(data.net2025, data.net2027E);
      const opMargin2027 = ratioValue(data.op2027E, data.revenue2027E);
      const marginChange = opMargin2025 !== null && opMargin2027 !== null ? opMargin2027 - opMargin2025 : null;
      const per2027 = asNumber(data.per2027E);
      const reliabilityScore = reliability?.level === "상" ? 2 : reliability?.level === "중상" ? 1.5 : reliability?.level === "중" ? 1 : 0.5;
      let score = 0;
      if (expectedReturn !== null && expectedReturn >= 50) score += 2;
      else if (expectedReturn !== null && expectedReturn >= 15) score += 1;
      if (revenueCagr !== null && revenueCagr >= 20) score += 1;
      if (opCagr !== null && opCagr >= 20) score += 1;
      if (opMargin2027 !== null && opMargin2027 >= 15) score += 1;
      if (per2027 !== null && netCagr !== null && netCagr > 0 && per2027 <= netCagr) score += 1;
      score += reliabilityScore;
      const decision = expectedReturn === null || netCagr === null
        ? "데이터 보강 후 판단"
        : score >= 7
          ? "우선 검토 후보"
          : score >= 5
            ? "관찰하며 매수 타이밍 검토"
            : "추가 근거 필요";
      const rows = [
        { metric: "미래가치 대비 여유", value: formatPercent(expectedReturn), check: expectedReturn !== null && expectedReturn >= 50 ? "충분" : expectedReturn !== null && expectedReturn >= 15 ? "보통" : "부족/확인" },
        { metric: "현재 시총이 요구하는 2027E 순이익", value: formatAmount(requiredNetIncome), check: fairMultiple ? `적정 PER ${fairMultiple}배 기준` : "확인 필요" },
        { metric: "컨센서스 순이익 여유", value: formatPercent(netIncomeBuffer), check: netIncomeBuffer !== null && netIncomeBuffer >= 50 ? "여유 큼" : netIncomeBuffer !== null && netIncomeBuffer >= 15 ? "여유 있음" : netIncomeBuffer !== null ? "여유 작음" : "확인 필요" },
        { metric: "2025→2027E 매출 증가액", value: formatAmount(revenueIncrease), check: revenueIncrease !== null && revenueIncrease > 0 ? "성장 반영" : "확인 필요" },
        { metric: "2025→2027E 영업이익 증가액", value: formatAmount(opIncrease), check: opIncrease !== null && opIncrease > 0 ? "이익 레버리지" : "확인 필요" },
        { metric: "2025→2027E 순이익 증가액", value: formatAmount(netIncrease), check: netIncrease !== null && netIncrease > 0 ? "순이익 성장" : "확인 필요" },
        { metric: "매출 성장 속도", value: formatPercent(revenueCagr), check: revenueCagr !== null && revenueCagr >= 20 ? "강함" : revenueCagr !== null && revenueCagr >= 10 ? "보통" : "확인 필요" },
        { metric: "이익 성장 속도", value: formatPercent(opCagr), check: opCagr !== null && opCagr >= 20 ? "강함" : opCagr !== null && opCagr >= 10 ? "보통" : "확인 필요" },
        { metric: "순이익 성장 속도", value: formatPercent(netCagr), check: netCagr !== null && netCagr >= 20 ? "강함" : netCagr !== null && netCagr >= 10 ? "보통" : "확인 필요" },
        { metric: "2027E 영업이익률", value: formatPercent(opMargin2027), check: opMargin2027 !== null && opMargin2027 >= 15 ? "높음" : opMargin2027 !== null && opMargin2027 >= 10 ? "보통" : "확인 필요" },
        { metric: "영업이익률 변화", value: marginChange === null ? "확인 필요" : `${marginChange >= 0 ? "+" : ""}${marginChange.toFixed(1)}%p`, check: marginChange !== null && marginChange > 0 ? "마진 개선" : marginChange !== null ? "마진 둔화" : "확인 필요" },
        { metric: "2027E PER", value: hasValue(data.per2027E) ? `${data.per2027E}배` : "확인 필요", check: per2027 !== null && netCagr !== null && per2027 <= netCagr ? "성장률 대비 부담 낮음" : "비교 필요" },
        { metric: "추정치 신뢰도", value: reliability?.level || "확인 필요", check: reliability?.backlog || "수주·CAPA·반복 매출 근거 확인 필요" },

    function renderValuationEssentials(company) {
      const valuation = valuationEssentials[company.code];
      if (!valuation) {
        return `<p class="soft">미래가치 판단 자료가 아직 입력되지 않았습니다.</p>`;
      }

      const data = valuationData[company.code] || {};
      const hasValue = (value) => value !== null && value !== undefined && value !== "";
      const asNumber = (value) => hasValue(value) ? Number(String(value).replace(/,/g, "")) : null;
      const estimatePair = (first, second, unit = "억원") => {
        if (!hasValue(first) && !hasValue(second)) return null;
        return `2026E ${hasValue(first) ? first : "확인 필요"}${unit} / 2027E ${hasValue(second) ? second : "확인 필요"}${unit}`;
      };
      const cagr = (start, end) => {
        const startNumber = asNumber(start);
        const endNumber = asNumber(end);
        if (!startNumber || !endNumber || startNumber <= 0 || endNumber <= 0) return null;
        const rate = (Math.pow(endNumber / startNumber, 1 / 2) - 1) * 100;
        return `약 ${rate.toFixed(1)}%`;
      };
      const marginPath = () => {
        const revenue2025 = asNumber(data.revenue2025);
        const revenue2027 = asNumber(data.revenue2027E);
        const op2025 = asNumber(data.op2025);
        const op2027 = asNumber(data.op2027E);
        if (!revenue2025 || !revenue2027 || !op2025 || !op2027) return null;
        return `영업이익률 2025 ${((op2025 / revenue2025) * 100).toFixed(1)}% -> 2027E ${((op2027 / revenue2027) * 100).toFixed(1)}%`;
      };
      const opMultiple = () => {
        const marketCap = asNumber(data.marketCap);
        const op2027 = asNumber(data.op2027E);
        if (!marketCap || !op2027) return null;
        return `시총/2027E 영업이익 ${((marketCap / op2027)).toFixed(1)}배`;
      };
      const assumption = futureValueAssumptions[company.code] || {};
      const fairMultiple = asNumber(assumption.fairMultiple);
      const marketCap = asNumber(data.marketCap);
      const futureNetIncome = asNumber(data.net2027E);
      const fairMarketCap = fairMultiple && futureNetIncome ? futureNetIncome * fairMultiple : null;
      const expectedReturn = fairMarketCap && marketCap ? ((fairMarketCap / marketCap) - 1) * 100 : null;
      const returnJudgment = expectedReturn === null
        ? "계산 보류"
        : expectedReturn >= 50
          ? "미래가치 대비 저평가 후보"
          : expectedReturn >= 15
            ? "추가 검토 구간"
            : expectedReturn >= 0
              ? "적정가 근처"
              : "미래 기대가 이미 많이 반영된 구간";
      const rowFor = (item) => {
        let value = null;
        let source = "추가 확인 필요";
        if (item.includes("현재 시가총액") && hasValue(data.marketCap)) {
          value = `${data.marketCap}억원`;
          source = "FnGuide 확인";
        } else if (item.includes("2026E·2027E 순이익")) {
          value = estimatePair(data.net2026E, data.net2027E);
          source = value ? "FnGuide 컨센서스" : source;
        } else if (item.includes("2026E·2027E 영업이익")) {
          value = estimatePair(data.op2026E, data.op2027E);
          source = value ? "FnGuide 컨센서스" : source;
        } else if (item.includes("2025~2027E 순이익 CAGR")) {
          value = cagr(data.net2025, data.net2027E);
          source = value ? "계산값" : source;
        } else if (item.includes("2025~2027E 영업이익 CAGR")) {
          value = cagr(data.op2025, data.op2027E);
          source = value ? "계산값" : source;
        } else if (item.includes("2027E PER") && hasValue(data.per2027E)) {
          value = `${data.per2027E}배`;
          source = "계산값";
        } else if (item.includes("2027E EV/영업이익")) {
          value = opMultiple();
          source = value ? "EV 대체 계산" : source;
        } else if (item.includes("기준 시나리오 업사이드")) {
          value = expectedReturn !== null ? `${expectedReturn.toFixed(1)}%` : null;
          source = value ? returnJudgment : source;
        } else if (item.includes("마진")) {
          value = marginPath();
          source = value ? "계산값" : source;
        }
        return {
          metric: item,
          value: value || "자료 확보 필요",
          source
        };
      };
      const baseRows = [
        { metric: "2025 실제 매출/영업이익/순이익", value: hasValue(data.revenue2025) ? `${data.revenue2025} / ${data.op2025 || "확인 필요"} / ${data.net2025 || "확인 필요"}억원` : "자료 확보 필요", source: hasValue(data.revenue2025) ? "FnGuide 확인" : "추가 확인 필요" },
        { metric: "2026E·2027E 매출", value: estimatePair(data.revenue2026E, data.revenue2027E), source: hasValue(data.revenue2026E) || hasValue(data.revenue2027E) ? "FnGuide 컨센서스" : "추가 확인 필요" },
        { metric: "12M PER", value: hasValue(data.per12m) ? `${data.per12m}배` : "자료 확보 필요", source: hasValue(data.per12m) ? "FnGuide 확인" : "추가 확인 필요" }
      ];
      const dataRows = [
        ...valuation.required.map(rowFor),
        ...baseRows.filter((row) => row.value && row.value !== "자료 확보 필요")
      ];
      const dataSource = data.sourceDate || "시장 데이터 확인 필요";
      const futureValueRows = [
        { metric: "현재 시가총액", value: marketCap ? `${fmtAmount(marketCap)}억원` : "자료 확보 필요", source: marketCap ? "FnGuide 확인" : "추가 확인 필요" },
        { metric: "2027E 순이익", value: futureNetIncome ? `${fmtAmount(futureNetIncome)}억원` : "자료 확보 필요", source: futureNetIncome ? "FnGuide 컨센서스" : "추가 확인 필요" },
        { metric: "적정 PER 가정", value: fairMultiple ? `${fairMultiple}배` : "자료 확보 필요", source: assumption.basis || "가정 필요" },
        { metric: "미래 적정 시가총액", value: fairMarketCap ? `${fmtAmount(Math.round(fairMarketCap))}억원` : "계산 보류", source: fairMarketCap ? "2027E 순이익 x 적정 PER" : "2027E 순이익 필요" },
        { metric: "기대수익률", value: expectedReturn !== null ? `${expectedReturn.toFixed(1)}%` : "계산 보류", source: returnJudgment },
        { metric: "주의할 조건", value: assumption.caution || "추가 확인 필요", source: "추정치 신뢰도" }
      ];

      return `
        <div class="research-grid">
          <div class="research-box">
            <h4>필수 입력값</h4>
            <ul>${valuation.required.map((item) => `<li>${item}</li>`).join("")}</ul>
          </div>
          <div class="research-box">
            <h4>판단 기준</h4>
            <ul>
              <li>핵심 이익 지표: ${valuation.profitMetric}</li>
              <li>핵심 밸류에이션: ${valuation.multipleMetric}</li>
              <li>자료 상태: ${valuation.status}</li>
            </ul>
          </div>
        </div>
        <div class="section">
          <h3>미래가치 데이터 현황</h3>
          <div class="history-table">
            <table>
              <thead>
                <tr>
                  <th>필수값</th>
                  <th>현재 데이터</th>
                  <th>상태</th>
                </tr>
              </thead>
              <tbody>
                ${dataRows.map((row) => `
                  <tr>
                    <td>${row.metric}</td>
                    <td>${row.value}</td>
                    <td><span class="status-tag">${row.source}</span></td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
          <div class="data-caption">데이터 기준: ${dataSource}. PER은 현재 시가총액을 2026E/2027E 순이익으로 나눈 값입니다. EV/영업이익은 순차입금 자료를 제외하고 시가총액/영업이익으로 대체 표시했습니다.</div>
        </div>
        <div class="section">
          <h3>미래가치 대비 현재 가격</h3>
          <div class="history-table">
            <table>
              <thead>
                <tr>
                  <th>판단 항목</th>
                  <th>값</th>
                  <th>근거/상태</th>
                </tr>
              </thead>
              <tbody>
                ${futureValueRows.map((row) => `
                  <tr>
                    <td>${row.metric}</td>
                    <td>${row.value}</td>
                    <td><span class="status-tag">${row.source}</span></td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
          <div class="data-caption">계산식: 미래 적정 시가총액 = 2027E 순이익 x 적정 PER 가정, 기대수익률 = 미래 적정 시가총액 / 현재 시가총액 - 1. 적정 PER은 대시보드용 가정이며 실제 매수 전에는 업황, 수주, 마진, 경쟁력, 주가 반영도를 다시 확인해야 합니다.</div>
        </div>
        <div class="section">
          <h3>계산 방식</h3>
          <p>${valuation.method}</p>
        </div>
        <div class="note">${valuation.cheapRule}</div>
      `;
    }

      const reliability = estimateReliability[company.code];
      if (!reliability) {

      detailBody.innerHTML = `

        <div class="stat-grid">
          <div class="stat"><label>매출 성장</label><strong>${fmt(company.revenueGrowth)}</strong></div>
          <div class="stat"><label>영업이익률</label><strong>${fmt(company.opMargin)}</strong></div>
          <div class="stat"><label>순이익률</label><strong>${fmt(company.netMargin)}</strong></div>
        </div>
        <div class="section">
          <h3>최근 3년 재무 추이</h3>
          ${renderHistoryTable(company)}
        </div>
        <div class="section">
          <h3>성장 렌즈 적용</h3>
          ${renderCompanyGrowthLens(company)}
        </div>
        <div class="section">
          <h3>성장성 추가 확인 자료</h3>
          ${renderGrowthEvidenceSources(company)}
        </div>
        <div class="section">
          <h3>성장성 판단</h3>
          <p>${company.thesis}</p>
        </div>
        <div class="section">
          <h3>상세 조사 메모</h3>
          ${renderResearch(company)}
        </div>
        <div class="section">
          <h3>추가 성장 자료</h3>
          ${renderGrowthAdditions(company)}
        </div>
        <div class="section">
          <h3>워치리스트 관리</h3>
          ${renderWatchlistMeta(company)}
        </div>
        <div class="section">
          <h3>리서치·공시 근거 보강</h3>
          ${renderEvidenceDeepDive(company)}
        </div>
        ${renderCompanyDeepReview(company)}
        <div class="section">
          <h3>매수 검토 판단 자료</h3>
          ${renderBuyReadiness(company)}
        </div>
        <div class="section">
          <h3>미래가치 필수 판단</h3>
          ${renderValuationEssentials(company)}
        </div>
        <div class="section">
          <h3>추정치 신뢰도</h3>
          ${renderEstimateReliability(company)}
        </div>
        <div class="section">
          <h3>업종 내 경쟁력</h3>
          ${renderCompetitivePosition(company)}
        </div>
        <div class="section">
          <h3>확인한 수치</h3>
          <p>${company.facts}</p>
        </div>
        <div class="section">
          <h3>남은 확인 과제</h3>
          ${renderRemainingChecks(company)}
        </div>
        <div class="section">
          <h3>남은 과제 조사 결과</h3>
          ${renderRemainingResearch(company)}
        </div>
        <div class="section">
          <h3>확인 결과 업데이트</h3>
          ${renderCheckResults(company)}
        </div>
        <div class="section">
          <h3>바로 확인한 과제</h3>
          ${renderQuickCheckUpdates(company)}
        </div>
        <div class="section">
          <h3>추가 자료</h3>
          <div class="link-list">
            ${company.links.map(([label, url]) => `<a href="${url}" target="_blank" rel="noopener noreferrer">${label}</a>`).join("")}
          </div>
        </div>
        <div class="note">이 화면은 투자 판단을 돕는 리서치 정리용입니다. 실제 매수 전에는 최신 사업보고서, 분기보고서, 현금흐름표, 밸류에이션, 주가 반영 정도를 다시 확인해야 합니다.</div>
      `;
    }

    rows.addEventListener("click", (event) => {
      const tr = event.target.closest("tr[data-code]");
      if (!tr) return;
      state.selectedCode = tr.dataset.code;
      renderRows();
    });

    document.querySelectorAll(".filter-btn").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        state.filter = button.dataset.filter;
        renderRows();
      });
    });

    searchInput.addEventListener("input", (event) => {
      state.search = event.target.value.trim();
      renderRows();
    });

    industrySelect.addEventListener("change", (event) => {
      state.industry = event.target.value;
      renderRows();
    });

    function setPanelMode(mode) {
      mainLayout.classList.toggle("list-collapsed", mode === "list");
      mainLayout.classList.toggle("detail-collapsed", mode === "detail");
      listColumn.classList.toggle("collapsed", mode === "list");
      detailPanel.classList.toggle("collapsed", mode === "detail");
    }

    collapseListBtn.addEventListener("click", () => setPanelMode("list"));
    openListBtn.addEventListener("click", () => setPanelMode("normal"));
    collapseDetailBtn.addEventListener("click", () => setPanelMode("detail"));
    openDetailBtn.addEventListener("click", () => setPanelMode("normal"));

    renderIndustries();
    renderRows();
  </script>
</body>
</html>
